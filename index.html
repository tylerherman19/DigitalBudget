<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AD76 · Digital Budget Tracker</title>
  <style>
    :root {
      --bg: #f7f6f1;
      --navy: #1a2744;
      --text: #111827;
      --slate: #4a5568;
      --slate2: #718096;
      --border: rgba(26,39,68,0.12);
      --green-bg: #dcfce7;
      --green-text: #166534;
      --amber-bg: #fef3c7;
      --amber-text: #92400e;
      --red-bg: #fee2e2;
      --red-text: #991b1b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }
    body {
      background: var(--bg);
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
      font-weight: 400;
    }

    /* ── Typography ── */
    .eyebrow {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--slate);
      font-weight: 400;
    }
    h1 {
      font-size: 22px;
      font-weight: 500;
      color: var(--navy);
    }

    /* ── App layout ── */
    #app {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-bottom: 20px;
    }
    .header-left .eyebrow { margin-bottom: 6px; }
    .header-right {
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }
.days-box {
      background: var(--navy);
      color: #fff;
      padding: 12px 20px;
      text-align: center;
    }
    .days-number {
      font-size: 40px;
      font-weight: 500;
      line-height: 1;
    }
    .days-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-top: 2px;
    }
    .header-rule {
      border: none;
      border-top: 2px solid var(--navy);
      margin-bottom: 0;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .tab {
      background: none;
      border: none;
      padding: 12px 20px;
      cursor: pointer;
      font-size: 14px;
      color: var(--slate);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      font-weight: 400;
      font-family: inherit;
    }
    .tab.active {
      color: var(--navy);
      border-bottom-color: var(--navy);
      font-weight: 500;
    }

    /* ── Error banner ── */
    #error-banner {
      background: var(--red-bg);
      color: var(--red-text);
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .btn-retry {
      background: none;
      border: 1px solid var(--red-text);
      color: var(--red-text);
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    /* ── Section headers ── */
    .section-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--slate);
      margin-bottom: 16px;
    }
    .section-gap { margin-bottom: 32px; }

    /* ── KPI Grid ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 1px solid var(--border);
    }
    .kpi-card {
      padding: 20px;
      border-right: 1px solid var(--border);
    }
    .kpi-card:last-child { border-right: none; }
    .kpi-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--slate);
      margin-bottom: 8px;
    }
    .kpi-value {
      font-size: 28px;
      font-weight: 500;
      color: var(--navy);
    }
    .kpi-sub {
      font-size: 12px;
      color: var(--slate2);
      margin-top: 4px;
    }

    /* ── Burn bar ── */
    .burn-container { padding: 8px 0 4px; }
    .burn-track {
      height: 10px;
      background: #e8e6df;
      border-radius: 2px;
      position: relative;
      overflow: visible;
      margin-top: 28px;
    }
    .burn-fill {
      height: 100%;
      background: var(--navy);
      border-radius: 2px;
    }
    .burn-tick {
      position: absolute;
      top: -6px;
      width: 2px;
      background: var(--slate);
      height: 22px;
    }
    .burn-tick-label {
      position: absolute;
      top: -20px;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--slate);
      white-space: nowrap;
      transform: translateX(-50%);
    }
    .date-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--slate2);
      margin-top: 6px;
    }
    .burn-status {
      font-size: 12px;
      color: var(--slate);
      margin-top: 8px;
      text-align: right;
    }

    /* ── Channel rows ── */
    .channel-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .channel-row:first-child { border-top: 1px solid var(--border); }
    .channel-name {
      width: 160px;
      font-size: 13px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .channel-bar-wrap { flex: 1; }
    .channel-bar-track {
      height: 8px;
      background: #e8e6df;
      border-radius: 2px;
    }
    .channel-bar-fill {
      height: 100%;
      background: var(--navy);
      border-radius: 2px;
    }
    .channel-nums {
      width: 160px;
      font-size: 12px;
      color: var(--slate);
      text-align: right;
      flex-shrink: 0;
    }
    .channel-badge {
      width: 80px;
      text-align: right;
      flex-shrink: 0;
    }
    .status-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: .05em;
      display: inline-block;
    }
    .badge-green { background: var(--green-bg); color: var(--green-text); }
    .badge-amber { background: var(--amber-bg); color: var(--amber-text); }
    .badge-red { background: var(--red-bg); color: var(--red-text); }
    .badge-gray { background: #e5e7eb; color: #374151; }
    .pre-campaign-row td { color: var(--slate); font-style: italic; background: #f5f5f2; }
    .pre-campaign-note { font-size: 13px; color: var(--slate2); margin-bottom: 12px; }
    .week-section-divider td { border-top: 2px solid #d4cfc7; padding: 0; height: 0; font-size: 0; }

    /* ── Tables ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--slate);
      font-weight: 400;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    tr.current-week td { background: rgba(26,39,68,0.04); }
    tr.totals-row td {
      font-weight: 500;
      border-top: 2px solid var(--border);
      border-bottom: none;
    }
    .diff-positive { color: var(--red-text); }
    .diff-negative { color: var(--green-text); }
    .text-right { text-align: right; }

    /* ── Log form ── */
    .log-section {
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 16px;
    }
    .log-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--slate);
      margin-bottom: 12px;
    }
    .form-row {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
    }
    .form-field { flex: 1; }
    label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--slate);
      display: block;
      margin-bottom: 4px;
    }
    input[type=text],
    input[type=number],
    input[type=date] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    input[type=text]:focus,
    input[type=number]:focus,
    input[type=date]:focus {
      border-color: var(--navy);
    }
    .btn-save {
      background: var(--navy);
      color: #fff;
      border: none;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-save:hover { opacity: 0.9; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-note {
      font-size: 12px;
      color: var(--slate2);
      margin-top: 8px;
      font-style: italic;
    }
    .msg-success {
      color: var(--green-text);
      background: var(--green-bg);
      padding: 8px 12px;
      font-size: 13px;
      margin-top: 12px;
    }
    .msg-error {
      color: var(--red-text);
      background: var(--red-bg);
      padding: 8px 12px;
      font-size: 13px;
      margin-top: 12px;
    }

    /* ── Auth bar ── */
    .auth-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0 16px;
      font-size: 13px;
    }
    .btn-signin {
      background: var(--navy);
      color: #fff;
      border: none;
      padding: 8px 20px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .auth-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--slate);
    }
    .auth-email { font-weight: 500; color: var(--navy); }
    .btn-signout {
      background: none;
      border: 1px solid var(--border);
      color: var(--slate);
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
    }

    /* ── Analytics Tab ── */
    .analytics-kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .analytics-kpi-grid .kpi-card { border-bottom: none; }
    .analytics-kpi-grid .kpi-card:last-child { border-right: none; }
    .kpi-card-green { background: var(--green-bg); }
    .kpi-card-amber { background: var(--amber-bg); }
    .kpi-card-red   { background: var(--red-bg); }
    .kpi-value-green { color: var(--green-text) !important; }
    .kpi-value-amber { color: var(--amber-text) !important; }
    .kpi-value-red   { color: var(--red-text)   !important; }
    .stale-note {
      font-size: 11px;
      color: var(--amber-text);
      margin-top: 4px;
      font-style: italic;
    }
    .chart-container {
      position: relative;
      width: 100%;
      height: 320px;
      margin-bottom: 8px;
    }
    .dsp-tracker {
      border: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .dsp-tracker-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }
    .dsp-tracker-row:last-of-type { border-bottom: none; }
    .dsp-tracker-date {
      width: 80px;
      font-size: 13px;
      color: var(--slate);
      flex-shrink: 0;
    }
    .dsp-tracker-amount {
      flex: 1;
      font-size: 15px;
      font-weight: 500;
      color: var(--navy);
    }
    .dsp-tracker-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn-toggle-dsp {
      background: none;
      border: 1px solid var(--border);
      color: var(--slate);
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-toggle-dsp:hover { border-color: var(--navy); color: var(--navy); }
    .dsp-totals-bar {
      display: flex;
      justify-content: flex-end;
      gap: 24px;
      padding: 12px 20px;
      font-size: 12px;
      color: var(--slate);
      border-top: 2px solid var(--border);
    }
    .dsp-totals-bar strong { color: var(--navy); }
    .no-data-note {
      color: var(--slate2);
      font-style: italic;
      padding: 20px 0;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <!-- Main App -->
  <div id="app">
    <header class="page-header">
      <div class="header-left">
        <div class="eyebrow">AD76 · Primary 2026</div>
        <h1>Dina Nina Martinez-Rutherford · Digital spend</h1>
      </div>
      <div class="header-right">
        <div class="days-box">
          <div class="days-number" id="days-count">—</div>
          <div class="days-label">Days to<br>Election</div>
        </div>
      </div>
    </header>
    <hr class="header-rule">

    <div class="auth-bar">
      <button class="btn-signin" id="auth-signin" onclick="signIn()">Sign in with Google</button>
      <div class="auth-indicator" id="auth-indicator" hidden>
        <span id="auth-email" class="auth-email"></span>
        <button class="btn-signout" onclick="signOut()">Sign out</button>
      </div>
    </div>

    <nav class="tabs">
      <button class="tab active" data-tab="summary" onclick="switchTab('summary')">Summary</button>
      <button class="tab" data-tab="detail" onclick="switchTab('detail')">Detail</button>
      <button class="tab" data-tab="log" onclick="switchTab('log')">Log Spend</button>
      <button class="tab" data-tab="analytics" onclick="switchTab('analytics')">Analytics</button>
    </nav>

    <div id="error-banner" hidden>
      <span id="error-msg">Failed to load data from Google Sheets.</span>
      <button class="btn-retry" onclick="loadData()">Retry</button>
    </div>

    <main>
      <section id="tab-summary"></section>
      <section id="tab-detail" hidden></section>
      <section id="tab-log" hidden></section>
      <section id="tab-analytics" hidden></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script>
    // ── Constants ──
    const CLIENT_ID = '1023469996726-hlpc7lc2ducddp8q286m53tp0qsti3op.apps.googleusercontent.com';
    const OAUTH_SCOPE = 'https://www.googleapis.com/auth/spreadsheets';
    const SPREADSHEET_ID = '1gHPmpRQxXCtBCB6AkXVljv1VRa1m6W5YV_Q34fevF0Q';
    const SHEET_NAME = 'Tracker';
    const ELECTION_DATE = new Date(2026, 7, 11);   // Aug 11 2026
    const CAMPAIGN_START = new Date(2026, 4, 26);  // May 26 2026
    const SHEETS_BASE = 'https://sheets.googleapis.com/v4/spreadsheets/' + SPREADSHEET_ID;

    // ── State ──
    let dataRows = [];
    let totalsRow = null;
    let currentTab = 'summary';
    let tokenClient = null;
    let accessToken = null;

    // ── Utility Functions ──
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function sum(arr) {
      return arr.reduce((a, b) => a + (parseFloat(b) || 0), 0);
    }

    function formatCurrency(n) {
      if (n === null || n === undefined || isNaN(n)) return '$0';
      return '$' + Math.round(n).toLocaleString('en-US');
    }

    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function formatDate(d) {
      if (!d) return '';
      return MONTHS[d.getMonth()] + ' ' + d.getDate();
    }

    function formatWeekRange(startDate) {
      const end = new Date(startDate);
      end.setDate(end.getDate() + 6);
      const s = MONTHS[startDate.getMonth()] + ' ' + startDate.getDate();
      const e = startDate.getMonth() === end.getMonth()
        ? '' + end.getDate()
        : MONTHS[end.getMonth()] + ' ' + end.getDate();
      return s + '\u2013' + e;
    }

    function parseSheetDate(str) {
      if (!str) return null;
      if (str.includes('/')) {
        const [m, d, y] = str.split('/').map(Number);
        return new Date(y, m - 1, d);
      }
      return new Date(str);
    }

    function sameDay(a, b) {
      if (!a || !b) return false;
      return a.getFullYear() === b.getFullYear() &&
             a.getMonth() === b.getMonth() &&
             a.getDate() === b.getDate();
    }

    function diffDays(a, b) {
      return Math.floor((b - a) / 86400000);
    }

    function getDaysToElection() {
      const today = new Date(); today.setHours(0,0,0,0);
      return Math.max(0, diffDays(today, ELECTION_DATE));
    }

    function getCampaignTotalDays() {
      return diffDays(CAMPAIGN_START, ELECTION_DATE);
    }

    function getStatusBadge(actualPct, expectedPct) {
      const diff = actualPct - expectedPct;
      if (diff > 8) return '<span class="status-badge badge-red">Over</span>';
      if (diff < -8) return '<span class="status-badge badge-green">Banking</span>';
      return '<span class="status-badge badge-green">On Pace</span>';
    }

    // ── Auth ──
    function initAuth() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: OAUTH_SCOPE,
        error_callback: (err) => {
          document.getElementById('error-msg').textContent = 'Sign-in error: ' + (err.type || 'unknown error');
          document.getElementById('error-banner').hidden = false;
        },
        callback: async (resp) => {
          if (resp.error) {
            document.getElementById('error-msg').textContent = 'Sign-in failed: ' + resp.error;
            document.getElementById('error-banner').hidden = false;
            return;
          }
          accessToken = resp.access_token;
          let email = 'Signed in';
          try {
            const uir = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
              headers: { Authorization: 'Bearer ' + accessToken }
            });
            if (uir.ok) {
              const ui = await uir.json();
              email = ui.email || email;
            }
          } catch (_) {}
          document.getElementById('auth-email').textContent = email;
          document.getElementById('auth-indicator').hidden = false;
          document.getElementById('auth-signin').hidden = true;
          loadData();
        }
      });
    }

    function signIn() {
      if (!tokenClient) {
        document.getElementById('error-msg').textContent = 'Authentication not ready — please refresh the page.';
        document.getElementById('error-banner').hidden = false;
        return;
      }
      tokenClient.requestAccessToken({ prompt: 'select_account' });
    }

    function signOut() {
      if (accessToken) {
        google.accounts.oauth2.revoke(accessToken, () => {});
      }
      accessToken = null;
      document.getElementById('auth-indicator').hidden = true;
      document.getElementById('auth-signin').hidden = false;
      document.getElementById('error-banner').hidden = true;
    }

    // ── Data ──
    async function loadData() {
      if (!accessToken) return;
      document.getElementById('error-banner').hidden = true;
      try {
        const authHeader = { Authorization: 'Bearer ' + accessToken };
        const [mainRes, totalsRes] = await Promise.all([
          fetch(SHEETS_BASE + '/values/Tracker!A2:U80', { headers: authHeader }),
          fetch(SHEETS_BASE + '/values/Tracker!A82:U82', { headers: authHeader }),
        ]);
        if (!mainRes.ok) {
          if (mainRes.status === 403) throw new Error('403');
          throw new Error('Main fetch failed: ' + mainRes.status);
        }
        if (!totalsRes.ok) {
          if (totalsRes.status === 403) throw new Error('403');
          throw new Error('Totals fetch failed: ' + totalsRes.status);
        }
        const mainJson = await mainRes.json();
        const totalsJson = await totalsRes.json();
        processSheetData(mainJson.values || [], totalsJson.values || []);
        renderAll();
      } catch (e) {
        console.error('loadData error', e);
        const msg = e.message === '403'
          ? 'Error 403 \u2014 make sure this Google account has Editor access to the spreadsheet and that the Google Sheets API is enabled in Cloud Console.'
          : 'Failed to load data: ' + e.message;
        document.getElementById('error-msg').textContent = msg;
        document.getElementById('error-banner').hidden = false;
      }
    }

    function parseFloat2(val) {
      if (val === undefined || val === null || val === '') return null;
      const s = String(val).replace(/[$,]/g, '');
      const n = parseFloat(s);
      return isNaN(n) ? null : n;
    }

    function parseFloatOrZero(val) {
      const n = parseFloat2(val);
      return n === null ? 0 : n;
    }

    function processSheetData(mainValues, totalsValues) {
      dataRows = mainValues.map((row, i) => {
        const get = (idx) => row[idx] !== undefined ? row[idx] : '';
        const rawDate = get(0);
        const parsedDate = parseSheetDate(rawDate);
        const isPreCampaign = !parsedDate || isNaN(parsedDate.getTime()) || parsedDate < CAMPAIGN_START;
        return {
          sheetRowNum: i + 2,
          date: isPreCampaign ? null : parsedDate,
          preLabel: isPreCampaign ? rawDate : null,
          isPreCampaign,
          gDisplayBudget: parseFloatOrZero(get(1)),
          gSearchBudget: parseFloatOrZero(get(2)),
          gActual: parseFloat2(get(3)),
          metaActual: parseFloat2(get(4)),
          dspActual: parseFloat2(get(11)),
          metaDailyBudget: parseFloatOrZero(get(7)),
          dailyTotalBudget: parseFloatOrZero(get(13)),  // N - Daily Total Budget (planned)
          dailyActual: parseFloatOrZero(get(14)),       // O - Daily Actual (actual spend)
          runningBudget: parseFloatOrZero(get(15)),     // P - Running Budget (cumulative planned)
          weeklyBudget: parseFloat2(get(17)),           // R - Weekly Budget
          weeklyActual: parseFloat2(get(18)),           // S - Weekly Total (actual)
          weeklyDiff: parseFloat2(get(20)),             // U - Weekly Difference
        };
      });

      if (totalsValues && totalsValues[0]) {
        const t = totalsValues[0];
        const get = (idx) => t[idx] !== undefined ? t[idx] : '';
        totalsRow = {
          gDisplayBudget:   parseFloatOrZero(get(1)),   // B82
          gSearchBudget:    parseFloatOrZero(get(2)),   // C82
          gActual:          parseFloatOrZero(get(3)),   // D82 - Google actual (cumulative)
          metaActual:       parseFloatOrZero(get(4)),   // E82 - Meta actual (cumulative)
          metaDailyBudget:  parseFloatOrZero(get(7)),   // H82 - Meta total budget
          dspBudget:        parseFloatOrZero(get(11)),  // L82 - DSPolitical lump-sum budget
          dspActual:        parseFloatOrZero(get(12)),  // M82 - DSPolitical spend proxy
          dailyActual:      parseFloatOrZero(get(14)),  // O82 - Daily Actual sum
          runningBudget:    parseFloatOrZero(get(15)),  // P82 - Running Budget
          totalBudget:      parseFloatOrZero(get(17)),  // R82 - Total campaign budget (SUM of weekly budgets)
          weeklyActual:     parseFloat2(get(18)),       // S82 - Weekly Total (actual)
          weeklyDiff:       parseFloat2(get(20)),       // U82 - Weekly Difference
        };
      }
    }

    function findRowForDate(dateInputValue) {
      const target = new Date(dateInputValue + 'T00:00:00');
      return dataRows.find(r => r.date && sameDay(r.date, target)) || null;
    }

    // ── Computed Values ──
    function getTotalBudget() {
      if (!totalsRow) return 0;
      return totalsRow.totalBudget;  // R82 = SUM(R2:R80) = total campaign budget
    }

    function getSpentToDate() {
      // D82 + E82 + M82 = Google actual + Meta actual + DSPolitical spend
      return totalsRow ? totalsRow.gActual + totalsRow.metaActual + totalsRow.dspActual : 0;
    }

    function getGoogleActual() {
      return totalsRow ? totalsRow.gActual : 0;
    }

    function getDspActual() {
      return totalsRow ? totalsRow.dspActual : 0;
    }

    function getMetaActual() {
      return totalsRow ? totalsRow.metaActual : 0;
    }

    function getGDisplayBudget() {
      return totalsRow ? totalsRow.gDisplayBudget : 0;
    }

    function getGSearchBudget() {
      return totalsRow ? totalsRow.gSearchBudget : 0;
    }

    function getMetaBudget() {
      return totalsRow ? totalsRow.metaDailyBudget : 0;
    }

    function getDspBudget() {
      return totalsRow ? totalsRow.dspBudget : 0;
    }

    function getExpectedPct() {
      const today = new Date(); today.setHours(0,0,0,0);
      const daysElapsed = Math.max(0, diffDays(CAMPAIGN_START, today));
      const totalDays = getCampaignTotalDays();
      return totalDays > 0 ? Math.min(100, daysElapsed / totalDays * 100) : 0;
    }

    function getPreCampaignRows() {
      return dataRows.filter(r => r.isPreCampaign);
    }

    function getPreCampaignBudget() {
      const rows = getPreCampaignRows();
      // 1. Weekly budget column (Q)
      const weeklySum = sum(rows.filter(r => r.weeklyBudget !== null).map(r => r.weeklyBudget));
      if (weeklySum > 0) return weeklySum;
      // 2. Daily total budget column (M)
      const dailySum = sum(rows.map(r => r.dailyTotalBudget || 0));
      if (dailySum > 0) return dailySum;
      // 3. Google budget columns (B+C) + Meta (H)
      return sum(rows.map(r => (r.gDisplayBudget || 0) + (r.gSearchBudget || 0) + (r.metaDailyBudget || 0)));
    }

    function getPreCampaignActual() {
      const rows = getPreCampaignRows();
      // 1. Weekly actual column (R)
      const weeklySum = sum(rows.filter(r => r.weeklyActual !== null).map(r => r.weeklyActual));
      if (weeklySum > 0) return weeklySum;
      // 2. Last known channel actuals from pre-campaign rows
      let gLast = 0, metaLast = 0, dspLast = 0;
      for (const r of rows) {
        if (r.gActual !== null) gLast = r.gActual;
        if (r.metaActual !== null) metaLast = r.metaActual;
        if (r.dspActual !== null) dspLast = r.dspActual;
      }
      return gLast + metaLast + dspLast;
    }

    function renderPreCampaignBurnBar() {
      const rows = getPreCampaignRows();
      if (rows.length === 0) return '';
      const budget = getPreCampaignBudget();
      const actual = getPreCampaignActual();
      const pct = budget > 0 ? Math.min(100, actual / budget * 100) : (actual > 0 ? 100 : 0);
      const firstLabel = rows.find(r => r.preLabel)?.preLabel || 'Pre-Campaign';
      return `
        <div class="burn-container" style="margin-bottom:16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            <span style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--slate2)">Pre-Campaign</span>
            <span style="font-size:12px;color:var(--slate2)">${formatCurrency(actual)} / ${formatCurrency(budget)}</span>
          </div>
          <div class="burn-track">
            <div class="burn-fill" style="width:${pct}%;background:var(--slate2)"></div>
          </div>
          <div class="date-labels" style="margin-top:4px">
            <span>${firstLabel}</span>
            <span>${formatDate(CAMPAIGN_START)}</span>
          </div>
        </div>`;
    }

    function getChannels() {
      return [
        { name: 'Google',            budget: getGDisplayBudget() + getGSearchBudget(), actual: getGoogleActual() },
        { name: 'Meta',              budget: getMetaBudget(),      actual: getMetaActual() },
        { name: 'DSPolitical/Other', budget: getDspBudget(),       actual: getDspActual() },
      ];
    }

    function getWeekRows() {
      return dataRows.filter(r => r.weeklyBudget !== null && !r.isPreCampaign);
    }

    function isCurrentWeek(weekStartRow) {
      const today = new Date(); today.setHours(0,0,0,0);
      const end = new Date(weekStartRow.date); end.setDate(end.getDate() + 6);
      return today >= weekStartRow.date && today <= end;
    }

    // ── Tab Switching ──
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(btn => {

      document.querySelectorAll('main section').forEach(sec => {

    function renderKPIs() {
      const totalBudget = getTotalBudget();
      const spent = getSpentToDate();
      const remaining = totalBudget - spent;
      const expectedPct = getExpectedPct();
      const actualPct = totalBudget > 0 ? spent / totalBudget * 100 : 0;
      const today = new Date(); today.setHours(0,0,0,0);
      const daysElapsed = Math.max(0, diffDays(CAMPAIGN_START, today));
      const totalDays = getCampaignTotalDays();

      return `
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-label">Total Budget</div>
            <div class="kpi-value">${formatCurrency(totalBudget)}</div>
            <div class="kpi-sub">${totalDays}-day campaign</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Spent to Date</div>
            <div class="kpi-value">${formatCurrency(spent)}</div>

          </div>
          <div class="kpi-card">
            <div class="kpi-label">Remaining</div>
            <div class="kpi-value">${formatCurrency(remaining)}</div>

          </div>
          <div class="kpi-card">
            <div class="kpi-label">Campaign Progress</div>
            <div class="kpi-value">${expectedPct.toFixed(1)}%</div>
            <div class="kpi-sub">Day ${daysElapsed} of ${totalDays}</div>

    function renderBurnBar() {
      const totalBudget = getTotalBudget();
      const spent = getSpentToDate();
      const actualPct = totalBudget > 0 ? Math.min(100, spent / totalBudget * 100) : 0;
      const expectedPct = Math.min(100, getExpectedPct());
      const bankOrOver = spent - (totalBudget * expectedPct / 100);
      const sign = bankOrOver >= 0 ? '+' : '';
      const label = bankOrOver >= 0
        ? sign + formatCurrency(bankOrOver) + ' ahead of pace'
        : formatCurrency(Math.abs(bankOrOver)) + ' under pace (banking)';

      return `
        <div class="burn-container">
          <div class="burn-track">
            <div class="burn-fill" style="width:${actualPct}%"></div>
            <div class="burn-tick" style="left:${expectedPct}%">

            </div>
          </div>
          <div class="date-labels">
            <span>${formatDate(CAMPAIGN_START)}</span>
            <span>${formatDate(ELECTION_DATE)}</span>
          </div>

    function renderWeeklyTable() {
      const weekRows = getWeekRows();
      const preCampaignRows = getPreCampaignRows().filter(r => r.weeklyBudget !== null);
      const expectedPct = getExpectedPct();

      if (weekRows.length === 0 && preCampaignRows.length === 0) {
        return '<tr><td colspan="5" style="color:var(--slate2);font-style:italic;padding:20px 12px">No weekly data available</td></tr>';
      }

      const preRows = preCampaignRows.map(row => {
        const budget = row.weeklyBudget || 0;
        const actual = row.weeklyActual !== null
          ? row.weeklyActual
          : ((row.gActual || 0) + (row.metaActual || 0) + (row.dspActual || 0));
        const diff = row.weeklyDiff !== null ? row.weeklyDiff : (actual - budget);
        const diffClass = diff > 0 ? 'diff-positive' : 'diff-negative';
        const diffSign = diff > 0 ? '+' : '';
        return `<tr class="pre-campaign-row">
          <td>${escapeHtml(row.preLabel || 'Before')}</td>
          <td class="text-right">${formatCurrency(budget)}</td>
          <td class="text-right">${formatCurrency(actual)}</td>
          <td class="text-right ${diffClass}">${diffSign}${formatCurrency(diff)}</td>
          <td><span class="status-badge badge-gray">Pre-Campaign</span></td>
        </tr>`;
      }).join('');

      const divider = (preCampaignRows.length > 0 && weekRows.length > 0)
        ? `<tr class="week-section-divider"><td colspan="5"></td></tr>`
        : '';

      const regularRows = weekRows.map(row => {
        const budget = row.weeklyBudget || 0;
        const actual = row.weeklyActual || 0;
        const diff = row.weeklyDiff !== null ? row.weeklyDiff : (actual - budget);
        const pct = budget > 0 ? (actual / budget * 100) : 0;
        const badge = getStatusBadge(pct, expectedPct);
        const diffClass = diff > 0 ? 'diff-positive' : 'diff-negative';
        const diffSign = diff > 0 ? '+' : '';
        const isCurrent = isCurrentWeek(row);
        return `<tr${isCurrent ? ' class="current-week"' : ''}>
          <td>${formatWeekRange(row.date)}</td>
          <td class="text-right">${formatCurrency(budget)}</td>
          <td class="text-right">${formatCurrency(actual)}</td>
          <td class="text-right ${diffClass}">${diffSign}${formatCurrency(diff)}</td>
          <td>${badge}</td>
        </tr>`;
      }).join('');

      return preRows + divider + regularRows;
    }

    function renderChannelTable(channels) {
      const expectedPct = getExpectedPct();
      let totalBudget = 0, totalActual = 0;
      const rows = channels.map(ch => {
        totalBudget += ch.budget;
        totalActual += ch.actual;
        const remaining = ch.budget - ch.actual;
        const pct = ch.budget > 0 ? (ch.actual / ch.budget * 100) : 0;
        const badge = getStatusBadge(pct, expectedPct);
        return `<tr>
          <td>${ch.name}</td>
          <td class="text-right">${formatCurrency(ch.budget)}</td>
          <td class="text-right">${formatCurrency(ch.actual)}</td>
          <td class="text-right">${formatCurrency(remaining)}</td>
          <td class="text-right">${pct.toFixed(1)}%</td>
          <td>${badge}</td>
        </tr>`;
      }).join('');
      const totalRemaining = totalBudget - totalActual;
      const totalPct = totalBudget > 0 ? (totalActual / totalBudget * 100) : 0;
      return rows + `<tr class="totals-row">
        <td>Total</td>
        <td class="text-right">${formatCurrency(totalBudget)}</td>
        <td class="text-right">${formatCurrency(totalActual)}</td>
        <td class="text-right">${formatCurrency(totalRemaining)}</td>
        <td class="text-right">${totalPct.toFixed(1)}%</td>
        <td></td>

    }

    // ── Log Spend ──
    async function handleSave() {
      const dateVal = document.getElementById('log-date').value;
      const displayVal = document.getElementById('log-display').value;
      const searchVal = document.getElementById('log-search').value;
      const metaVal = document.getElementById('log-meta').value;
      const msgEl = document.getElementById('log-msg');
      msgEl.innerHTML = '';

      if (!dateVal) {
        msgEl.innerHTML = '<div class="msg-error">Please select a date.</div>';
        return;
      }

      const row = findRowForDate(dateVal);
      if (!row) {
        msgEl.innerHTML = '<div class="msg-error">Date not in campaign range (May 26\u2013Aug 11, 2026).</div>';
        return;
      }

      const googleCumulative = (parseFloat(displayVal) || 0) + (parseFloat(searchVal) || 0);
      const metaCumulative = parseFloat(metaVal) || 0;

      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = 'Saving…';

      try {
        await writeSpend(row.sheetRowNum, googleCumulative, metaCumulative);
        msgEl.innerHTML = '<div class="msg-success">Saved successfully. Reloading data…</div>';
        await loadData();
        msgEl.innerHTML = '<div class="msg-success">Saved and data refreshed.</div>';
      } catch (e) {
        msgEl.innerHTML = '<div class="msg-error">Save failed: ' + e.message + '</div>';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Save';
      }
    }

    async function writeSpend(rowNum, googleVal, metaVal) {
      const range = encodeURIComponent('Tracker!D' + rowNum + ':E' + rowNum);
      const url = SHEETS_BASE + '/values/' + range + '?valueInputOption=USER_ENTERED';
      const res = await fetch(url, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + accessToken,
        },
        body: JSON.stringify({ values: [[googleVal, metaVal]] }),
      });
      if (!res.ok) {
        if (res.status === 403) throw new Error('Error 403 \u2014 make sure this Google account has Editor access to the spreadsheet and that the Google Sheets API is enabled in Cloud Console.');
        const errJson = await res.json().catch(() => ({}));
        throw new Error(errJson.error?.message || 'HTTP ' + res.status);
      }
      return res.json();
    }

    // ══════════════════════════════════════════════════════════════
    // ── Analytics: Helper Functions ──
    // ══════════════════════════════════════════════════════════════

    // Returns the last campaign date dynamically from sheet data
    function getPrimaryDate() {
      let maxDate = null;
      for (const r of dataRows) {
        if (!r.isPreCampaign && r.date) {
          if (!maxDate || r.date > maxDate) maxDate = r.date;
        }
      }
      return maxDate;
    }

    // Returns the last row that has non-null, non-zero gActual or metaActual
    function getLastActualRow() {
      let last = null;
      for (const r of dataRows) {
        if (!r.isPreCampaign && r.date) {
          if ((r.gActual !== null && r.gActual > 0) ||
              (r.metaActual !== null && r.metaActual > 0)) {
            last = r;
          }
        }
      }
      return last;
    }

    // Derives daily spend from cumulative columns D and E.
    // Returns array of {date, gDaily, metaDaily, total} for rows that have actuals.
    // prevG/prevMeta only advance when the column has a non-null value (handles sparse entries).
    function buildDailyActuals() {
      const result = [];
      let prevG = 0, prevMeta = 0;
      const rows = dataRows.filter(r => !r.isPreCampaign && r.date);
      for (const r of rows) {
        const gCum   = r.gActual    !== null ? r.gActual    : prevG;
        const mCum   = r.metaActual !== null ? r.metaActual : prevMeta;
        const gDay   = Math.max(0, gCum - prevG);
        const mDay   = Math.max(0, mCum - prevMeta);
        if (r.gActual !== null || r.metaActual !== null) {
          result.push({ date: r.date, gDaily: gDay, metaDaily: mDay, total: gDay + mDay, row: r });
        }
        if (r.gActual    !== null) prevG    = r.gActual;
        if (r.metaActual !== null) prevMeta = r.metaActual;
      }
      return result;
    }

    // Returns cumulative actual spend (Google + Meta + DSP payments) through asOfRow.date
    function getActualToDate(asOfRow) {
      let gCum = 0, mCum = 0, dspTotal = 0;
      for (const r of dataRows) {
        if (!r.isPreCampaign && r.date && r.date <= asOfRow.date) {
          if (r.gActual    !== null) gCum = r.gActual;
          if (r.metaActual !== null) mCum = r.metaActual;
          if (r.dspActual  !== null && r.dspActual > 0) dspTotal += r.dspActual;
        }
      }
      return gCum + mCum + dspTotal;
    }

    // Returns rows with DSPolitical lump-sum payment entries (column L non-null, > 0)
    function getDspPaymentRows() {
      return dataRows.filter(r => r.dspActual !== null && r.dspActual > 0);
    }

    // 7-day rolling average daily burn (Google + Meta ONLY, no DSP)
    // Uses the last 7 daily entries that had any spend
    function get7DayBurnRate() {
      const daily = buildDailyActuals();
      const withSpend = daily.filter(d => d.total > 0);
      const last7 = withSpend.slice(-7);
      if (last7.length === 0) return 0;
      return last7.reduce((s, d) => s + d.total, 0) / last7.length;
    }

    // Returns total unpaid DSP commitment (not toggled as PAID in localStorage)
    function getUnpaidDspTotal() {
      const dspRows = getDspPaymentRows();
      let stored = {};
      try { stored = JSON.parse(localStorage.getItem('dsp_payment_status') || '{}'); } catch (_) {}
      return dspRows.reduce((s, r) => {
        const paid = stored[r.sheetRowNum] === true;
        return paid ? s : s + r.dspActual;
      }, 0);
    }

    // Toggle DSP payment status in localStorage and re-render analytics section
    function toggleDspPayment(sheetRowNum) {
      let stored = {};
      try { stored = JSON.parse(localStorage.getItem('dsp_payment_status') || '{}'); } catch (_) {}
      stored[sheetRowNum] = !stored[sheetRowNum];
      localStorage.setItem('dsp_payment_status', JSON.stringify(stored));
      renderAnalytics();
    }

    // ── Analytics: Feature 1 — Pacing Status Card ──
    function renderPacingCard() {
      if (!totalsRow) {
        return `<div class="kpi-card"><div class="kpi-label">Pacing Status</div><div class="kpi-sub no-data-note">No data loaded</div></div>`;
      }
      const today = new Date(); today.setHours(0, 0, 0, 0);
      let targetRow = dataRows.find(r => r.date && sameDay(r.date, today) && !r.isPreCampaign) || null;
      let isStale = false;
      if (!targetRow) {
        targetRow = getLastActualRow();
        isStale = true;
      }
      if (!targetRow) {
        return `<div class="kpi-card"><div class="kpi-label">Pacing Status</div><div class="kpi-value">—</div><div class="kpi-sub">No campaign data yet</div></div>`;
      }
      const budgetedToDate = targetRow.runningBudget; // Column P — authoritative plan
      const actualToDate   = getActualToDate(targetRow);
      const delta          = actualToDate - budgetedToDate;
      const deltaPct       = budgetedToDate > 0 ? (delta / budgetedToDate * 100) : 0;
      const sign           = delta >= 0 ? '+' : '';
      // GREEN: within ±10% | AMBER: 10–25% behind | RED: >25% behind OR any overspend
      let colorClass = 'kpi-card-green', valueClass = 'kpi-value-green', statusText = 'On Pace';
      if (delta > 0) {
        colorClass = 'kpi-card-red'; valueClass = 'kpi-value-red'; statusText = 'Overspend';
      } else if (deltaPct < -25) {
        colorClass = 'kpi-card-red'; valueClass = 'kpi-value-red'; statusText = 'Far Behind';
      } else if (deltaPct < -10) {
        colorClass = 'kpi-card-amber'; valueClass = 'kpi-value-amber'; statusText = 'Behind Pace';
      }
      const staleNote = isStale
        ? `<div class="stale-note">Data as of ${formatDate(targetRow.date)}</div>` : '';
      return `
        <div class="kpi-card ${colorClass}">
          <div class="kpi-label">Pacing Status</div>
          <div class="kpi-value ${valueClass}">${sign}${formatCurrency(delta)}</div>
          <div class="kpi-sub">${sign}${deltaPct.toFixed(1)}% vs plan &nbsp;·&nbsp; ${statusText}</div>
          <div class="kpi-sub">Budgeted: ${formatCurrency(budgetedToDate)} &nbsp;·&nbsp; Actual: ${formatCurrency(actualToDate)}</div>
          ${staleNote}
        </div>`;
    }

    // ── Analytics: Feature 2 — Campaign Clock Card ──
    function renderClockCard() {
      const primaryDate   = getPrimaryDate();
      const today         = new Date(); today.setHours(0, 0, 0, 0);
      // Use CAMPAIGN_START and ELECTION_DATE constants for elapsed/remaining
      const totalDays     = getCampaignTotalDays();
      const daysElapsed   = Math.max(0, diffDays(CAMPAIGN_START, today));
      const daysRemaining = Math.max(0, diffDays(today, ELECTION_DATE));
      const pctElapsed    = totalDays > 0 ? (daysElapsed / totalDays * 100) : 0;
      const totalBudget   = getTotalBudget();
      const lastRow       = getLastActualRow();
      const actualSpent   = lastRow ? getActualToDate(lastRow) : 0;
      const pctSpent      = totalBudget > 0 ? (actualSpent / totalBudget * 100) : 0;
      const lag           = pctElapsed - pctSpent;
      const colorClass    = lag >= 15 ? 'kpi-card-amber' : '';
      const lagNote       = lag >= 15 ? ` <span style="color:var(--amber-text)">&#9888;</span>` : '';
      const primaryLabel  = primaryDate ? formatDate(primaryDate) : 'Aug 11';
      return `
        <div class="kpi-card ${colorClass}">
          <div class="kpi-label">Campaign Clock &nbsp;·&nbsp; Primary ${primaryLabel}</div>
          <div class="kpi-value">${daysRemaining}<span style="font-size:14px;font-weight:400;color:var(--slate)"> days left</span></div>
          <div class="kpi-sub">Day ${daysElapsed} of ${totalDays} &nbsp;·&nbsp; ${pctElapsed.toFixed(1)}% elapsed</div>
          <div class="kpi-sub">${pctSpent.toFixed(1)}% of budget spent${lagNote}</div>
        </div>`;
    }

    // ── Analytics: Feature 3 — Projected Final Spend Card ──
    function renderProjectionCard() {
      if (!totalsRow) {
        return `<div class="kpi-card"><div class="kpi-label">Projected Spend</div><div class="kpi-sub no-data-note">No data loaded</div></div>`;
      }
      const today         = new Date(); today.setHours(0, 0, 0, 0);
      const daysRemaining = Math.max(0, diffDays(today, ELECTION_DATE));
      const burnRate      = get7DayBurnRate();
      const lastRow       = getLastActualRow();
      const actualToDate  = lastRow ? getActualToDate(lastRow) : 0;
      const unpaidDsp     = getUnpaidDspTotal();
      const projected     = actualToDate + burnRate * daysRemaining + unpaidDsp;
      const totalBudget   = getTotalBudget();
      const diff          = projected - totalBudget;
      const sign          = diff >= 0 ? '+' : '';
      let colorClass = 'kpi-card-green', valueClass = 'kpi-value-green', label = 'On Track';
      if (diff > 0) {
        colorClass = 'kpi-card-red'; valueClass = 'kpi-value-red'; label = 'Over Budget';
      } else if (totalBudget > 0 && diff < -(totalBudget * 0.10)) {
        colorClass = 'kpi-card-amber'; valueClass = 'kpi-value-amber'; label = 'Underspend Risk';
      }
      return `
        <div class="kpi-card ${colorClass}">
          <div class="kpi-label">Projected Final Spend</div>
          <div class="kpi-value ${valueClass}">${formatCurrency(projected)}</div>
          <div class="kpi-sub">${sign}${formatCurrency(diff)} vs budget &nbsp;·&nbsp; ${label}</div>
          <div class="kpi-sub">${formatCurrency(Math.round(burnRate))}/day burn (7d avg) &nbsp;·&nbsp; ${daysRemaining}d left</div>
        </div>`;
    }

    // ── Analytics: Feature 4 — Data Freshness Card ──
    function renderFreshnessCard() {
      const lastRow = getLastActualRow();
      if (!lastRow) {
        return `
          <div class="kpi-card">
            <div class="kpi-label">Data Freshness</div>
            <div class="kpi-value" style="color:var(--slate2)">—</div>
            <div class="kpi-sub">No data entered yet</div>
          </div>`;
      }
      const today    = new Date(); today.setHours(0, 0, 0, 0);
      const daysAgo  = diffDays(lastRow.date, today);
      let color = 'var(--green-text)', msg = 'Current';
      if (daysAgo > 2) { color = 'var(--red-text)'; msg = 'Stale — update needed'; }
      else if (daysAgo > 0) { color = 'var(--amber-text)'; msg = 'Slightly stale'; }
      const warningBanner = daysAgo > 2
        ? `<div class="stale-note" style="color:var(--red-text)">&#9888; Dashboard data may be stale</div>` : '';
      return `
        <div class="kpi-card">
          <div class="kpi-label">Data Freshness</div>
          <div class="kpi-value" style="color:${color}">${daysAgo === 0 ? 'Today' : daysAgo + 'd ago'}</div>
          <div class="kpi-sub">Last entry: ${formatDate(lastRow.date)} &nbsp;·&nbsp; ${msg}</div>
          ${warningBanner}
        </div>`;
    }

    // ── Analytics: Feature 5 — Channel Budget Remaining Table ──
    function renderChannelRemainingTable() {
      if (!totalsRow) return `<p class="no-data-note">No data loaded.</p>`;
      const today         = new Date(); today.setHours(0, 0, 0, 0);
      const daysRemaining = Math.max(0, diffDays(today, ELECTION_DATE));
      const burnRate      = get7DayBurnRate();

      // Split Google burn rate proportionally between Display and Search
      const daily  = buildDailyActuals();
      const last7  = daily.filter(d => d.total > 0).slice(-7);
      const gBurnTotal = last7.reduce((s, d) => s + d.gDaily, 0);
      const mBurnTotal = last7.reduce((s, d) => s + d.metaDaily, 0);
      const totalBurn  = gBurnTotal + mBurnTotal || 1; // avoid div/0
      const gBurnRate  = burnRate * (gBurnTotal / totalBurn);
      const mBurnRate  = burnRate * (mBurnTotal / totalBurn);

      // Google Display / Search: budget from B82/C82, actual split proportionally from D82
      const gDisplayBudget = totalsRow.gDisplayBudget;
      const gSearchBudget  = totalsRow.gSearchBudget;
      const gTotalBudget   = gDisplayBudget + gSearchBudget || 1;
      const gActualTotal   = totalsRow.gActual;
      const gDisplayActual = gActualTotal * (gDisplayBudget / gTotalBudget);
      const gSearchActual  = gActualTotal * (gSearchBudget  / gTotalBudget);
      const gDisplayRatio  = gDisplayBudget / gTotalBudget;
      const gSearchRatio   = gSearchBudget  / gTotalBudget;

      const channels = [
        {
          name: 'Google Display',
          note: 'actuals split proportionally',
          allocated: gDisplayBudget,
          spent: gDisplayActual,
          projBurn: gBurnRate * gDisplayRatio * daysRemaining,
          isDsp: false,
        },
        {
          name: 'Google Search',
          note: 'actuals split proportionally',
          allocated: gSearchBudget,
          spent: gSearchActual,
          projBurn: gBurnRate * gSearchRatio * daysRemaining,
          isDsp: false,
        },
        {
          name: 'Meta',
          note: '',
          allocated: totalsRow.metaDailyBudget,
          spent: totalsRow.metaActual,
          projBurn: mBurnRate * daysRemaining,
          isDsp: false,
        },
        {
          name: 'DSPolitical',
          note: 'lump sum',
          allocated: totalsRow.dspBudget,
          spent: totalsRow.dspActual,
          projBurn: 0,
          isDsp: true,
        },
      ];

      const rows = channels.map(ch => {
        const remaining = ch.allocated - ch.spent;
        const pctUsed   = ch.allocated > 0 ? (ch.spent / ch.allocated * 100) : 0;
        const projected = ch.isDsp ? ch.allocated : (ch.spent + ch.projBurn);
        const overUnder = projected - ch.allocated;
        let badge = `<span class="status-badge badge-green">On Track</span>`;
        if (ch.spent >= ch.allocated && ch.allocated > 0) {
          badge = `<span class="status-badge badge-red">Exhausted</span>`;
        } else if (!ch.isDsp && ch.allocated > 0 && Math.abs(overUnder) > ch.allocated * 0.10) {
          badge = `<span class="status-badge badge-amber">At Risk</span>`;
        }
        const noteTxt = ch.note
          ? `<br><span style="font-size:11px;color:var(--slate2)">${ch.note}</span>` : '';
        return `<tr>
          <td>${ch.name}${noteTxt}</td>
          <td class="text-right">${formatCurrency(ch.allocated)}</td>
          <td class="text-right">${formatCurrency(ch.spent)}</td>
          <td class="text-right">${formatCurrency(remaining)}</td>
          <td class="text-right">${pctUsed.toFixed(1)}%</td>
          <td class="text-right">${ch.isDsp ? '—' : formatCurrency(projected)}</td>
          <td>${badge}</td>
        </tr>`;
      }).join('');

      return `
        <table>
          <thead>
            <tr>
              <th>Channel</th>
              <th class="text-right">Allocated</th>
              <th class="text-right">Spent</th>
              <th class="text-right">Remaining</th>
              <th class="text-right">% Used</th>
              <th class="text-right">Projected Final</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    // ── Analytics: Features 6 & 7 — Chart.js instances ──
    let _chartSpendPlan = null;
    let _chartWeekly    = null;

    function initSpendPlanChart() {
      const canvas = document.getElementById('chart-spend-plan');
      if (!canvas || !window.Chart) return;
      if (_chartSpendPlan) { _chartSpendPlan.destroy(); _chartSpendPlan = null; }

      const rows = dataRows.filter(r => !r.isPreCampaign && r.date);
      if (rows.length === 0) return;

      const labels      = rows.map(r => formatDate(r.date));
      const plannedData = rows.map(r => r.runningBudget || null);

      // Build cumulative actual line through the last row with data
      const lastRow       = getLastActualRow();
      const lastActualIdx = lastRow ? rows.findIndex(r => sameDay(r.date, lastRow.date)) : -1;
      let cumG = 0, cumM = 0, cumDsp = 0;
      const actualData = rows.map((r, i) => {
        if (i > lastActualIdx || lastActualIdx < 0) return null;
        if (r.gActual    !== null) cumG   = r.gActual;
        if (r.metaActual !== null) cumM   = r.metaActual;
        if (r.dspActual  !== null && r.dspActual > 0) cumDsp += r.dspActual;
        const val = cumG + cumM + cumDsp;
        return val > 0 ? val : null;
      });

      // Dotted projection line from last actual to end
      const burnRate = get7DayBurnRate();
      const anchorVal = lastActualIdx >= 0 ? (actualData[lastActualIdx] || 0) : 0;
      const anchorDate = lastActualIdx >= 0 ? rows[lastActualIdx].date : null;
      const projData = rows.map((r, i) => {
        if (!anchorDate || i < lastActualIdx) return null;
        if (i === lastActualIdx) return anchorVal;
        const daysBeyond = diffDays(anchorDate, r.date);
        return anchorVal + burnRate * daysBeyond;
      });

      // DSP payment vertical markers (shown as scatter points at y=0)
      const dspPaymentRows = getDspPaymentRows().filter(r => r.date);
      const dspMarkerData  = rows.map(r => {
        const hit = dspPaymentRows.find(d => sameDay(d.date, r.date));
        return hit ? { x: formatDate(r.date), y: 0, amount: hit.dspActual } : null;
      });

      const dspPlugin = {
        id: 'dspVerticals',
        afterDraw(chart) {
          if (!dspPaymentRows.length) return;
          const ctx2  = chart.ctx;
          const xAxis = chart.scales.x;
          const yAxis = chart.scales.y;
          dspPaymentRows.forEach(r => {
            const idx = rows.findIndex(row => sameDay(row.date, r.date));
            if (idx < 0) return;
            const x = xAxis.getPixelForValue(idx);
            ctx2.save();
            ctx2.beginPath();
            ctx2.moveTo(x, yAxis.top);
            ctx2.lineTo(x, yAxis.bottom);
            ctx2.strokeStyle = 'rgba(153,27,27,0.5)';
            ctx2.lineWidth = 1.5;
            ctx2.setLineDash([5, 3]);
            ctx2.stroke();
            // Label
            ctx2.fillStyle = '#991b1b';
            ctx2.font = '10px system-ui,sans-serif';
            ctx2.fillText(formatCurrency(r.dspActual), x + 4, yAxis.top + 12);
            ctx2.restore();
          });
        }
      };

      _chartSpendPlan = new Chart(canvas, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Planned Spend (Col P)',
              data: plannedData,
              borderColor: '#1a2744',
              backgroundColor: 'transparent',
              borderWidth: 2,
              pointRadius: 0,
              tension: 0.1,
              spanGaps: true,
            },
            {
              label: 'Actual Spend',
              data: actualData,
              borderColor: '#166534',
              backgroundColor: 'rgba(22,101,52,0.08)',
              fill: true,
              borderWidth: 2,
              pointRadius: 0,
              spanGaps: false,
              tension: 0.1,
            },
            {
              label: 'Projection',
              data: projData,
              borderColor: '#92400e',
              backgroundColor: 'transparent',
              borderWidth: 2,
              borderDash: [6, 4],
              pointRadius: 0,
              spanGaps: false,
              tension: 0.1,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12 } },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y !== null ? formatCurrency(ctx.parsed.y) : '—'}`,
              },
            },
          },
          scales: {
            x: {
              ticks: { maxTicksLimit: 12, font: { size: 10 } },
              grid: { color: 'rgba(0,0,0,0.04)' },
            },
            y: {
              ticks: {
                callback: v => '$' + (v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v),
                font: { size: 10 },
              },
              grid: { color: 'rgba(0,0,0,0.04)' },
            },
          },
        },
        plugins: [dspPlugin],
      });
    }

    function initWeeklyChart() {
      const canvas = document.getElementById('chart-weekly');
      if (!canvas || !window.Chart) return;
      if (_chartWeekly) { _chartWeekly.destroy(); _chartWeekly = null; }

      const weekRows = getWeekRows();
      if (weekRows.length === 0) return;

      const today   = new Date(); today.setHours(0, 0, 0, 0);
      const labels  = weekRows.map(r => formatWeekRange(r.date));
      const budgets = weekRows.map(r => r.weeklyBudget || 0);

      // Derive weekly actuals from daily actuals (sum days within each week range)
      const dailyActuals = buildDailyActuals();
      const weekActuals  = weekRows.map(r => {
        const weekEnd = new Date(r.date); weekEnd.setDate(weekEnd.getDate() + 6);
        const total = dailyActuals
          .filter(d => d.date >= r.date && d.date <= weekEnd)
          .reduce((s, d) => s + d.total, 0);
        // Fall back to weeklyActual column if daily data unavailable
        return total > 0 ? total : (r.weeklyActual || 0);
      });

      // Bar colors per week
      const barColors = weekRows.map((r, i) => {
        const budget   = budgets[i];
        const actual   = weekActuals[i];
        const weekEnd  = new Date(r.date); weekEnd.setDate(weekEnd.getDate() + 6);
        const isPast   = weekEnd < today;
        const isFuture = r.date > today;
        if (isFuture) return 'rgba(26,39,68,0.18)';
        if (!isPast)  return 'rgba(26,39,68,0.35)'; // current week
        if (budget === 0) return '#991b1b';
        const pct = actual / budget;
        if (actual === 0) return '#991b1b'; // zero spend when week passed
        const off = Math.abs(1 - pct);
        if (off <= 0.10) return 'rgba(22,101,52,0.7)';
        if (off <= 0.25) return 'rgba(146,64,14,0.7)';
        return 'rgba(153,27,27,0.7)';
      });
      const borderColors = weekRows.map((r, i) => {
        const weekEnd  = new Date(r.date); weekEnd.setDate(weekEnd.getDate() + 6);
        if (r.date > today) return '#1a2744';
        return barColors[i].replace(/[\d.]+\)$/, '1)'); // fully opaque border
      });
      const borderWidths = weekRows.map(r => r.date > today ? 1.5 : 1);

      _chartWeekly = new Chart(canvas, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            {
              label: 'Actual Spend',
              data: weekActuals,
              backgroundColor: barColors,
              borderColor: borderColors,
              borderWidth: borderWidths,
              order: 2,
            },
            {
              label: 'Weekly Budget',
              data: budgets,
              type: 'line',
              borderColor: '#1a2744',
              backgroundColor: 'transparent',
              borderWidth: 1.5,
              borderDash: [4, 3],
              pointRadius: 3,
              pointBackgroundColor: '#1a2744',
              tension: 0,
              order: 1,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12 } },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.dataset.label}: ${formatCurrency(ctx.parsed.y)}`,
              },
            },
          },
          scales: {
            x: { ticks: { font: { size: 10 } }, grid: { display: false } },
            y: {
              ticks: {
                callback: v => '$' + (v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v),
                font: { size: 10 },
              },
              grid: { color: 'rgba(0,0,0,0.04)' },
            },
          },
        },
      });
    }

    // ── Analytics: Feature 8 — DSPolitical Payment Tracker ──
    function renderDspTracker() {
      const dspRows = getDspPaymentRows();
      if (dspRows.length === 0) {
        return `<div class="no-data-note">No DSPolitical payment entries found in column L.</div>`;
      }
      let stored = {};
      try { stored = JSON.parse(localStorage.getItem('dsp_payment_status') || '{}'); } catch (_) {}
      let totalCommitted = 0, totalPaid = 0;
      const rowHtml = dspRows.map(r => {
        const paid    = stored[r.sheetRowNum] === true;
        totalCommitted += r.dspActual;
        if (paid) totalPaid += r.dspActual;
        const badge   = paid
          ? `<span class="status-badge badge-green">Paid</span>`
          : `<span class="status-badge badge-amber">Unpaid</span>`;
        const btnLabel = paid ? 'Mark Unpaid' : 'Mark Paid';
        return `
          <div class="dsp-tracker-row">
            <div class="dsp-tracker-date">${r.date ? formatDate(r.date) : '—'}</div>
            <div class="dsp-tracker-amount">${formatCurrency(r.dspActual)}</div>
            <div class="dsp-tracker-controls">
              ${badge}
              <button class="btn-toggle-dsp" onclick="toggleDspPayment(${r.sheetRowNum})">${btnLabel}</button>
            </div>
          </div>`;
      }).join('');
      const unpaid = totalCommitted - totalPaid;
      return `
        <div class="dsp-tracker">
          ${rowHtml}
          <div class="dsp-totals-bar">
            <span>Committed: <strong>${formatCurrency(totalCommitted)}</strong></span>
            <span>Paid: <strong>${formatCurrency(totalPaid)}</strong></span>
            <span>Unpaid: <strong>${formatCurrency(unpaid)}</strong></span>
          </div>
        </div>`;
    }

    // ── Analytics: Main Orchestrator ──
    function renderAnalytics() {
      const el = document.getElementById('tab-analytics');
      if (!el) return;

      if (!totalsRow && dataRows.length === 0) {
        el.innerHTML = `<p class="no-data-note">Sign in and load data to view analytics.</p>`;
        return;
      }

      el.innerHTML = `
        <div class="section-gap">
          <div class="section-header">Campaign Status</div>
          <div class="analytics-kpi-grid">
            ${renderPacingCard()}
            ${renderClockCard()}
            ${renderProjectionCard()}
            ${renderFreshnessCard()}
          </div>
        </div>

        <div class="section-gap">
          <div class="section-header">Channel Budget Remaining</div>
          ${renderChannelRemainingTable()}
        </div>

        <div class="section-gap">
          <div class="section-header">Cumulative Spend vs Plan</div>
          <div class="chart-container"><canvas id="chart-spend-plan"></canvas></div>
        </div>

        <div class="section-gap">
          <div class="section-header">Weekly Spend vs Plan</div>
          <div class="chart-container"><canvas id="chart-weekly"></canvas></div>
        </div>

        <div class="section-gap">
          <div class="section-header">DSPolitical Payment Tracker</div>
          ${renderDspTracker()}
        </div>`;

      // Init charts after DOM is written.
      // Charts are initialized on first Analytics tab view (when section is visible)
      // to avoid 0-width canvas issue with display:none sections.
      if (!window._analyticsTabHooked) {
        window._analyticsTabHooked = true;
        const _origSwitch = window.switchTab;
        window.switchTab = function(tab) {
          _origSwitch(tab);
          if (tab === 'analytics') {
            requestAnimationFrame(() => {
              initSpendPlanChart();
              initWeeklyChart();
            });
          }
        };
      }
      // If analytics tab is currently active, init charts now
      if (document.getElementById('tab-analytics') && !document.getElementById('tab-analytics').hidden) {
        requestAnimationFrame(() => {
          initSpendPlanChart();
          initWeeklyChart();
        });
      }
    }

    // ── Init ──
    window.onload = function () {
      // initAuth() is called via the GIS script's onload attribute once the library loads.
      // loadData() is triggered automatically after successful OAuth sign-in.
    };
  </script>
  <script src="https://accounts.google.com/gsi/client" onload="initAuth()"></script>
</body>
</html>
